name: Deploy

# Deploys the TRT-LLM serving pod to GKE (L4 spot, engine baked into GAR image)
# or K3s on DGX (engine_gb10/) or AGX (engine_sm87/) via hostPath from shared storage.
# TRT-LLM engines are GPU-arch-specific — target_gpu is inferred from host.
# Run undeploy.yaml when done to stop costs (GKE) or free GPU memory (K3s).

on:
  workflow_dispatch:
    inputs:
      host:
        description: Deployment target (dgx, agx, gke)
        required: false
        default: dgx
        type: choice
        options:
          - dgx
          - agx
          - gke
      image_tag:
        description: "Image tag to deploy (default: latest, GKE only)"
        required: false
        default: latest
      run_id:
        description: "Compression run to use (default: latest, DGX/AGX only)"
        required: false
        default: latest

permissions:
  contents: read
  id-token: write

env:
  PROJECT_NAME: "llama32-3b-serving-trt-engine"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ vars.GKE_ZONE }}
  GAR_REPO: ${{ vars.GAR_REPO }}

jobs:
  deploy-dgx:
    if: inputs.host == 'dgx'
    runs-on: [self-hosted, dgx]
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: echo "KUBECONFIG=${HOME}/.kube/config" >> "${GITHUB_ENV}"

      - name: Resolve engine path (engine_gb10 for DGX Spark)
        env:
          DGX_HOST_USER: ${{ vars.DGX_HOST_USER }}
        run: |
          COMPRESSION_PROJECT=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['compression']['project'])")
          INPUT_RUN_ID="${{ inputs.run_id }}"
          CONFIG_RUN_ID=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['compression']['run_id'])")
          RUN_ID="${INPUT_RUN_ID:-$CONFIG_RUN_ID}"
          # Use runner-container path for validation (shared storage is mounted here)
          SHARED="${HOME}/shared/huggingface-kfp"
          BASE_DIR="${SHARED}/engines/${COMPRESSION_PROJECT}"
          if [[ "$RUN_ID" == "latest" ]]; then
            RUN_ID=$(ls -1t "${BASE_DIR}/" 2>/dev/null | head -1)
            if [[ -z "$RUN_ID" ]]; then
              echo "ERROR: No run directories in ${BASE_DIR}/"
              exit 1
            fi
            echo "Auto-detected run: ${RUN_ID}"
          fi
          TARGET_GPU="gb10"
          VALIDATE_PATH="${BASE_DIR}/${RUN_ID}/engine_${TARGET_GPU}"
          if [[ ! -d "$VALIDATE_PATH" ]]; then
            echo "ERROR: Engine path not found: ${VALIDATE_PATH}"
            echo "Run the compression pipeline to compile the engine_gb10/ subdirectory for DGX Spark."
            exit 1
          fi
          # K8s hostPath must be the actual host filesystem path (kubelet is not the runner container)
          HOST_SHARED="/home/${DGX_HOST_USER}/shared/huggingface-kfp"
          ENGINE_PATH="${HOST_SHARED}/engines/${COMPRESSION_PROJECT}/${RUN_ID}/engine_${TARGET_GPU}"
          echo "ENGINE_PATH=${ENGINE_PATH}" >> "$GITHUB_ENV"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "COMPRESSION_PROJECT=${COMPRESSION_PROJECT}" >> "$GITHUB_ENV"
          # Read max_batch_size from engine config — runtime cannot exceed compile-time value
          MAX_BATCH_SIZE=$(python3 -c "import json; c=json.load(open('${VALIDATE_PATH}/config.json')); print(c['build_config']['max_batch_size'])")
          echo "MAX_BATCH_SIZE=${MAX_BATCH_SIZE}" >> "$GITHUB_ENV"
          echo "Engine max_batch_size: ${MAX_BATCH_SIZE}"
          # Resolve HF model path for tokenizer/config (trtllm-serve needs --tokenizer pointing to HF config.json)
          HF_PATH=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c.get('model', {}).get('hf_path', ''))")
          if [[ -z "$HF_PATH" ]]; then
            echo "ERROR: model.hf_path not set in serving-config.yaml"
            exit 1
          fi
          VALIDATE_MODEL_PATH="${SHARED}/${HF_PATH}"
          if [[ ! -d "$VALIDATE_MODEL_PATH" ]]; then
            echo "ERROR: HF model path not found: ${VALIDATE_MODEL_PATH}"
            exit 1
          fi
          MODEL_PATH="${HOST_SHARED}/${HF_PATH}"
          echo "MODEL_PATH=${MODEL_PATH}" >> "$GITHUB_ENV"
          echo "HF model path: ${MODEL_PATH}"

      - name: Ensure namespace
        run: kubectl create namespace "$PROJECT_NAME" --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Ensure nvcr-pull secret
        run: |
          kubectl create secret docker-registry nvcr-pull \
            --docker-server=nvcr.io \
            --docker-username='$oauthtoken' \
            --docker-password="${{ secrets.NGC_API_KEY }}" \
            -n "$PROJECT_NAME" \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Unserve Ollama
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          LOADED=$(curl -s http://localhost:11434/api/ps 2>/dev/null \
            | jq -r '.models[0].name // empty' || true)
          if [[ -n "$LOADED" ]]; then
            curl -s -X POST http://localhost:11434/api/generate \
              -H "Content-Type: application/json" \
              -d "{\"model\":\"$LOADED\",\"keep_alive\":0}" > /dev/null || true
            echo "Unloaded Ollama model: $LOADED"
          else
            echo "No Ollama model loaded — skipping"
          fi
          gh api -X PATCH \
            "repos/miramar-labs-org/miramar-platform-gcp/actions/variables/CURRENT_OLLAMA_MODEL" \
            -f value="none" 2>/dev/null || true
          gh api -X PATCH \
            "repos/miramar-labs-org/miramar-platform-gcp/actions/variables/CURRENT_OLLAMA_VRAM_GB" \
            -f value="0" 2>/dev/null || true
          gh api --method PATCH "/orgs/miramar-labs-org/actions/variables/DGX_OLLAMA_ACTIVE" \
            -f name="DGX_OLLAMA_ACTIVE" -f value="false" -f visibility="all" 2>/dev/null || true

      - name: Undeploy active serving project
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          ACTIVE_REPO=$(gh api "orgs/miramar-labs-org/repos?type=public&per_page=100" \
            --jq '[.[] | select(.topics != null and (.topics | index("miramar-project") != null))] | .[].name' \
            | while read repo; do
                val=$(gh api "repos/miramar-labs-org/${repo}/actions/variables/DGX_SERVING_ACTIVE" \
                  --jq '.value // empty' 2>/dev/null || true)
                [[ "$val" == "true" ]] && echo "$repo" && break
              done || true)
          if [[ -n "$ACTIVE_REPO" && "$ACTIVE_REPO" != "$PROJECT_NAME" ]]; then
            echo "Undeploying active serving project: ${ACTIVE_REPO}"
            gh workflow run undeploy.yaml \
              --repo "miramar-labs-org/${ACTIVE_REPO}" || true
            sleep 5
            RUN_ID=$(gh run list --repo "miramar-labs-org/${ACTIVE_REPO}" \
              --workflow=undeploy.yaml --limit=1 --json databaseId --jq '.[0].databaseId')
            echo "Waiting for undeploy run ${RUN_ID} to complete..."
            gh run watch "${RUN_ID}" --repo "miramar-labs-org/${ACTIVE_REPO}" --exit-status || true
            echo "Undeploy complete"
          else
            echo "No active serving project to undeploy"
          fi

      - name: Substitute and apply K3s manifest
        run: |
          SERVED_MODEL_NAME=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['model']['served_model_name'])")
          sed "s|ENGINE_PATH_PLACEHOLDER|${ENGINE_PATH}|g" k8s/trtllm-k3s.yaml \
            | sed "s|SERVED_MODEL_NAME_PLACEHOLDER|${SERVED_MODEL_NAME}|g" \
            | sed "s|MAX_BATCH_SIZE_PLACEHOLDER|${MAX_BATCH_SIZE}|g" \
            | sed "s|MODEL_PATH_PLACEHOLDER|${MODEL_PATH}|g" \
            | kubectl apply --validate=false -f -

      - name: Wait for rollout
        run: kubectl rollout status deployment/trtllm -n "$PROJECT_NAME" --timeout=1800s

      - name: Smoke test
        run: |
          kubectl port-forward svc/trtllm 18000:8000 -n "$PROJECT_NAME" &
          PF_PID=$!
          sleep 5
          trap "kill $PF_PID 2>/dev/null || true" EXIT

          SERVED_MODEL_NAME=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['model']['served_model_name'])")

          curl -sf http://localhost:18000/v1/models | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          models=[m['id'] for m in d.get('data',[])]
          print('Models:', models)
          "

          PASS=0; FAIL=0
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            PROMPT=$(echo "$line" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('prompt',''))")
            [[ -z "$PROMPT" ]] && continue
            RESP=$(curl -sf -X POST http://localhost:18000/v1/chat/completions \
              -H "Content-Type: application/json" \
              -d "{\"model\":\"${SERVED_MODEL_NAME}\",\"messages\":[{\"role\":\"user\",\"content\":\"${PROMPT}\"}],\"max_tokens\":100}" \
              2>&1 || echo "CURL_ERROR")
            if echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'][:80])" 2>/dev/null; then
              PASS=$((PASS+1))
            else
              echo "FAIL: $RESP"
              FAIL=$((FAIL+1))
            fi
          done < smoke_test_prompts.jsonl

          echo "Smoke tests: $PASS passed, $FAIL failed"
          [[ $FAIL -eq 0 ]] || exit 1

      - name: Set serving state
        if: success()
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          gh api --method PATCH \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables/DGX_SERVING_ACTIVE" \
            -f value="true" 2>/dev/null || \
          gh api --method POST \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables" \
            -f name="DGX_SERVING_ACTIVE" -f value="true"

      - name: Record VRAM
        if: success()
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          VRAM_MiB=$(nvidia-smi --query-compute-apps=process_name,used_memory \
            --format=csv,noheader 2>/dev/null \
            | grep -i "tensorrt" \
            | awk -F',' '{gsub(/[^0-9]/,"",$2); sum+=$2} END{print sum+0}' || echo 0)
          VRAM_GB=$(( ${VRAM_MiB:-0} / 1024 ))
          gh api --method PATCH \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables/DGX_TRTLLM_VRAM_GB" \
            -f value="${VRAM_GB}" 2>/dev/null || \
          gh api --method POST \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables" \
            -f name="DGX_TRTLLM_VRAM_GB" -f value="${VRAM_GB}"

      - name: Update Open WebUI backend URL
        if: success()
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          BACKEND_URL="http://trtllm.${PROJECT_NAME}.svc.cluster.local:8000/v1"
          gh api --method PATCH "/orgs/miramar-labs-org/actions/variables/DGX_OPENWEBUI_API_URL" \
            -f name="DGX_OPENWEBUI_API_URL" -f value="${BACKEND_URL}" -f visibility="all" \
          || gh api --method POST "/orgs/miramar-labs-org/actions/variables" \
            -f name="DGX_OPENWEBUI_API_URL" -f value="${BACKEND_URL}" -f visibility="all"
          OWUI_ACTIVE=$(gh api "orgs/miramar-labs-org/actions/variables/DGX_OPENWEBUI_ACTIVE" \
            --jq '.value // empty' 2>/dev/null || true)
          if [[ "$OWUI_ACTIVE" == "true" ]]; then
            gh workflow run deploy-openwebui.yaml \
              --repo miramar-labs-org/miramar-platform-gcp \
              --field host=dgx
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deploy: $PROJECT_NAME (DGX K3s, engine_gb10)"
            echo "| | |"
            echo "|---|---|"
            echo "| Compression run | \`${RUN_ID}\` |"
            echo "| Engine | \`engine_gb10\` (DGX Spark GB10) |"
            echo "| Namespace | \`$PROJECT_NAME\` |"
            echo "| Port-forward | \`kubectl port-forward svc/trtllm 8000:8000 -n $PROJECT_NAME\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-agx:
    if: inputs.host == 'agx'
    runs-on: [self-hosted, agx]
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: echo "KUBECONFIG=${HOME}/.kube/config" >> "${GITHUB_ENV}"

      - name: Resolve engine path (engine_sm87 for AGX Orin)
        env:
          AGX_HOST_USER: ${{ vars.AGX_HOST_USER }}
        run: |
          COMPRESSION_PROJECT=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['compression']['project'])")
          INPUT_RUN_ID="${{ inputs.run_id }}"
          CONFIG_RUN_ID=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['compression']['run_id'])")
          RUN_ID="${INPUT_RUN_ID:-$CONFIG_RUN_ID}"
          # Use runner-container path for validation (shared storage is mounted here)
          SHARED="${HOME}/shared/huggingface-kfp"
          BASE_DIR="${SHARED}/engines/${COMPRESSION_PROJECT}"
          if [[ "$RUN_ID" == "latest" ]]; then
            RUN_ID=$(ls -1t "${BASE_DIR}/" 2>/dev/null | head -1)
            if [[ -z "$RUN_ID" ]]; then
              echo "ERROR: No run directories in ${BASE_DIR}/"
              exit 1
            fi
            echo "Auto-detected run: ${RUN_ID}"
          fi
          TARGET_GPU="sm87"
          VALIDATE_PATH="${BASE_DIR}/${RUN_ID}/engine_${TARGET_GPU}"
          if [[ ! -d "$VALIDATE_PATH" ]]; then
            echo "ERROR: Engine path not found: ${VALIDATE_PATH}"
            echo "Run the compression pipeline to compile the engine_sm87/ subdirectory for AGX Orin."
            exit 1
          fi
          # K8s hostPath must be the actual host filesystem path (kubelet is not the runner container)
          HOST_SHARED="/home/${AGX_HOST_USER}/shared/huggingface-kfp"
          ENGINE_PATH="${HOST_SHARED}/engines/${COMPRESSION_PROJECT}/${RUN_ID}/engine_${TARGET_GPU}"
          echo "ENGINE_PATH=${ENGINE_PATH}" >> "$GITHUB_ENV"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "COMPRESSION_PROJECT=${COMPRESSION_PROJECT}" >> "$GITHUB_ENV"
          # Read max_batch_size from engine config — runtime cannot exceed compile-time value
          MAX_BATCH_SIZE=$(python3 -c "import json; c=json.load(open('${VALIDATE_PATH}/config.json')); print(c['build_config']['max_batch_size'])")
          echo "MAX_BATCH_SIZE=${MAX_BATCH_SIZE}" >> "$GITHUB_ENV"
          echo "Engine max_batch_size: ${MAX_BATCH_SIZE}"
          # Resolve HF model path for tokenizer/config (trtllm-serve needs --tokenizer pointing to HF config.json)
          HF_PATH=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c.get('model', {}).get('hf_path', ''))")
          if [[ -z "$HF_PATH" ]]; then
            echo "ERROR: model.hf_path not set in serving-config.yaml"
            exit 1
          fi
          VALIDATE_MODEL_PATH="${SHARED}/${HF_PATH}"
          if [[ ! -d "$VALIDATE_MODEL_PATH" ]]; then
            echo "ERROR: HF model path not found: ${VALIDATE_MODEL_PATH}"
            exit 1
          fi
          MODEL_PATH="${HOST_SHARED}/${HF_PATH}"
          echo "MODEL_PATH=${MODEL_PATH}" >> "$GITHUB_ENV"
          echo "HF model path: ${MODEL_PATH}"

      - name: Ensure namespace
        run: kubectl create namespace "$PROJECT_NAME" --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Ensure nvcr-pull secret
        run: |
          kubectl create secret docker-registry nvcr-pull \
            --docker-server=nvcr.io \
            --docker-username='$oauthtoken' \
            --docker-password="${{ secrets.NGC_API_KEY }}" \
            -n "$PROJECT_NAME" \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Unserve Ollama
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          LOADED=$(curl -s http://localhost:11434/api/ps 2>/dev/null \
            | jq -r '.models[0].name // empty' || true)
          if [[ -n "$LOADED" ]]; then
            curl -s -X POST http://localhost:11434/api/generate \
              -H "Content-Type: application/json" \
              -d "{\"model\":\"$LOADED\",\"keep_alive\":0}" > /dev/null || true
            echo "Unloaded Ollama model: $LOADED"
          else
            echo "No Ollama model loaded — skipping"
          fi
          gh api -X PATCH \
            "repos/miramar-labs-org/miramar-platform-gcp/actions/variables/CURRENT_OLLAMA_MODEL_AGX" \
            -f value="none" 2>/dev/null || true
          gh api -X PATCH \
            "repos/miramar-labs-org/miramar-platform-gcp/actions/variables/CURRENT_OLLAMA_VRAM_GB_AGX" \
            -f value="0" 2>/dev/null || true
          gh api --method PATCH "/orgs/miramar-labs-org/actions/variables/AGX_OLLAMA_ACTIVE" \
            -f name="AGX_OLLAMA_ACTIVE" -f value="false" -f visibility="all" 2>/dev/null || true

      - name: Substitute and apply K3s manifest
        run: |
          SERVED_MODEL_NAME=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['model']['served_model_name'])")
          sed "s|ENGINE_PATH_PLACEHOLDER|${ENGINE_PATH}|g" k8s/trtllm-k3s.yaml \
            | sed "s|SERVED_MODEL_NAME_PLACEHOLDER|${SERVED_MODEL_NAME}|g" \
            | sed "s|MAX_BATCH_SIZE_PLACEHOLDER|${MAX_BATCH_SIZE}|g" \
            | sed "s|MODEL_PATH_PLACEHOLDER|${MODEL_PATH}|g" \
            | kubectl apply --validate=false -f -

      - name: Wait for rollout
        run: kubectl rollout status deployment/trtllm -n "$PROJECT_NAME" --timeout=1800s

      - name: Smoke test
        run: |
          kubectl port-forward svc/trtllm 18000:8000 -n "$PROJECT_NAME" &
          PF_PID=$!
          sleep 5
          trap "kill $PF_PID 2>/dev/null || true" EXIT

          SERVED_MODEL_NAME=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['model']['served_model_name'])")

          curl -sf http://localhost:18000/v1/models | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          models=[m['id'] for m in d.get('data',[])]
          print('Models:', models)
          "

          PASS=0; FAIL=0
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            PROMPT=$(echo "$line" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('prompt',''))")
            [[ -z "$PROMPT" ]] && continue
            RESP=$(curl -sf -X POST http://localhost:18000/v1/chat/completions \
              -H "Content-Type: application/json" \
              -d "{\"model\":\"${SERVED_MODEL_NAME}\",\"messages\":[{\"role\":\"user\",\"content\":\"${PROMPT}\"}],\"max_tokens\":100}" \
              2>&1 || echo "CURL_ERROR")
            if echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'][:80])" 2>/dev/null; then
              PASS=$((PASS+1))
            else
              echo "FAIL: $RESP"
              FAIL=$((FAIL+1))
            fi
          done < smoke_test_prompts.jsonl

          echo "Smoke tests: $PASS passed, $FAIL failed"
          [[ $FAIL -eq 0 ]] || exit 1

      - name: Set serving state
        if: success()
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          gh api --method PATCH \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables/AGX_SERVING_ACTIVE" \
            -f value="true" 2>/dev/null || \
          gh api --method POST \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables" \
            -f name="AGX_SERVING_ACTIVE" -f value="true"

      - name: Record VRAM
        if: success()
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          VRAM_MiB=$(nvidia-smi --query-compute-apps=process_name,used_memory \
            --format=csv,noheader 2>/dev/null \
            | grep -i "tensorrt" \
            | awk -F',' '{gsub(/[^0-9]/,"",$2); sum+=$2} END{print sum+0}' || echo 0)
          VRAM_GB=$(( ${VRAM_MiB:-0} / 1024 ))
          gh api --method PATCH \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables/AGX_TRTLLM_VRAM_GB" \
            -f value="${VRAM_GB}" 2>/dev/null || \
          gh api --method POST \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables" \
            -f name="AGX_TRTLLM_VRAM_GB" -f value="${VRAM_GB}"

      - name: Update Open WebUI backend URL
        if: success()
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          BACKEND_URL="http://trtllm.${PROJECT_NAME}.svc.cluster.local:8000/v1"
          gh api --method PATCH "/orgs/miramar-labs-org/actions/variables/AGX_OPENWEBUI_API_URL" \
            -f name="AGX_OPENWEBUI_API_URL" -f value="${BACKEND_URL}" -f visibility="all" \
          || gh api --method POST "/orgs/miramar-labs-org/actions/variables" \
            -f name="AGX_OPENWEBUI_API_URL" -f value="${BACKEND_URL}" -f visibility="all"
          OWUI_ACTIVE=$(gh api "orgs/miramar-labs-org/actions/variables/AGX_OPENWEBUI_ACTIVE" \
            --jq '.value // empty' 2>/dev/null || true)
          if [[ "$OWUI_ACTIVE" == "true" ]]; then
            gh workflow run deploy-openwebui.yaml \
              --repo miramar-labs-org/miramar-platform-gcp \
              --field host=agx
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deploy: $PROJECT_NAME (AGX K3s, engine_sm87)"
            echo "| | |"
            echo "|---|---|"
            echo "| Compression run | \`${RUN_ID}\` |"
            echo "| Engine | \`engine_sm87\` (AGX Orin sm_87) |"
            echo "| Namespace | \`$PROJECT_NAME\` |"
            echo "| Port-forward | \`kubectl port-forward svc/trtllm 8000:8000 -n $PROJECT_NAME\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-gke:
    if: inputs.host == 'gke'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Expand GPU node pool (L4 spot)
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          echo "Triggering gke-expand-gpu (nvidia-l4, spot=true, namespace=$PROJECT_NAME)"
          gh workflow run gke-expand-gpu.yaml \
            --repo miramar-labs-org/miramar-platform-gcp \
            --field namespace="$PROJECT_NAME" \
            --field gpu_type=nvidia-l4 \
            --field spot=true
          echo "Waiting for GPU node pool to be ready..."
          for i in $(seq 1 40); do
            NODE=$(kubectl get nodes -l cloud.google.com/gke-accelerator=nvidia-l4 \
              --no-headers 2>/dev/null | grep -c "Ready" || true)
            if [[ "$NODE" -ge 1 ]]; then
              echo "GPU node ready."
              break
            fi
            echo "Waiting... ($i/40)"
            sleep 15
          done
          kubectl get nodes -l cloud.google.com/gke-accelerator=nvidia-l4

      - name: Build image URI
        id: image_uri
        run: |
          TAG="${{ inputs.image_tag }}"
          URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPO}/${PROJECT_NAME}:${TAG}"
          echo "uri=$URI" >> "$GITHUB_OUTPUT"

      - name: Substitute and apply manifest
        run: |
          SERVED_MODEL_NAME=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['model']['served_model_name'])")
          sed "s|IMAGE_PLACEHOLDER|${{ steps.image_uri.outputs.uri }}|g" k8s/trtllm.yaml \
            | sed "s|SERVED_MODEL_NAME_PLACEHOLDER|${SERVED_MODEL_NAME}|g" \
            | kubectl apply --validate=false -f -

      - name: Wait for rollout
        run: kubectl rollout status deployment/trtllm -n "$PROJECT_NAME" --timeout=1800s

      - name: Smoke test
        run: |
          kubectl port-forward svc/trtllm 18000:8000 -n "$PROJECT_NAME" &
          PF_PID=$!
          sleep 5
          trap "kill $PF_PID 2>/dev/null || true" EXIT

          SERVED_MODEL_NAME=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['model']['served_model_name'])")

          curl -sf http://localhost:18000/v1/models | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          models=[m['id'] for m in d.get('data',[])]
          print('Models:', models)
          "

          PASS=0; FAIL=0
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            PROMPT=$(echo "$line" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('prompt',''))")
            [[ -z "$PROMPT" ]] && continue
            RESP=$(curl -sf -X POST http://localhost:18000/v1/chat/completions \
              -H "Content-Type: application/json" \
              -d "{\"model\":\"${SERVED_MODEL_NAME}\",\"messages\":[{\"role\":\"user\",\"content\":\"${PROMPT}\"}],\"max_tokens\":100}" \
              2>&1 || echo "CURL_ERROR")
            if echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'][:80])" 2>/dev/null; then
              PASS=$((PASS+1))
            else
              echo "FAIL: $RESP"
              FAIL=$((FAIL+1))
            fi
          done < smoke_test_prompts.jsonl

          echo "Smoke tests: $PASS passed, $FAIL failed"
          [[ $FAIL -eq 0 ]] || exit 1

      - name: Set serving state
        if: success()
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          gh api --method PATCH \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables/GKE_SERVING_ACTIVE" \
            -f value="true" 2>/dev/null || \
          gh api --method POST \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables" \
            -f name="GKE_SERVING_ACTIVE" -f value="true"

      - name: Update Open WebUI backend URL
        if: success()
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          BACKEND_URL="http://trtllm.${PROJECT_NAME}.svc.cluster.local:8000/v1"
          gh api --method PATCH "/orgs/miramar-labs-org/actions/variables/GKE_OPENWEBUI_API_URL" \
            -f name="GKE_OPENWEBUI_API_URL" -f value="${BACKEND_URL}" -f visibility="all" \
          || gh api --method POST "/orgs/miramar-labs-org/actions/variables" \
            -f name="GKE_OPENWEBUI_API_URL" -f value="${BACKEND_URL}" -f visibility="all"
          OWUI_ACTIVE=$(gh api "orgs/miramar-labs-org/actions/variables/GKE_OPENWEBUI_ACTIVE" \
            --jq '.value // empty' 2>/dev/null || true)
          if [[ "$OWUI_ACTIVE" == "true" ]]; then
            gh workflow run deploy-openwebui.yaml \
              --repo miramar-labs-org/miramar-platform-gcp \
              --field host=gke
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deploy: $PROJECT_NAME (GKE, engine_l4)"
            echo "| | |"
            echo "|---|---|"
            echo "| Image | \`${{ steps.image_uri.outputs.uri }}\` |"
            echo "| Engine | \`engine_l4\` (GKE L4 sm_89) |"
            echo "| Namespace | \`$PROJECT_NAME\` |"
            echo "| Port-forward | \`kubectl port-forward svc/trtllm 8000:8000 -n $PROJECT_NAME\` |"
          } >> "$GITHUB_STEP_SUMMARY"
