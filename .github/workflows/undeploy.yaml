name: Undeploy

# Removes the TRT-LLM deployment from GKE (and tears down the GPU node pool) or K3s on DGX/AGX.
# Always run this after testing to stop GPU costs (GKE ~$0.22/hr for L4 spot) or free GPU memory (K3s).

on:
  workflow_dispatch:
    inputs:
      host:
        description: Deployment target to undeploy (dgx, agx, gke)
        required: false
        default: dgx
        type: choice
        options:
          - dgx
          - agx
          - gke

permissions:
  contents: read
  id-token: write

env:
  PROJECT_NAME: "llama32-3b-serving-trt-engine"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ vars.GKE_ZONE }}

jobs:
  undeploy-dgx:
    if: inputs.host == 'dgx'
    runs-on: [self-hosted, dgx]
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: echo "KUBECONFIG=${HOME}/.kube/config" >> "${GITHUB_ENV}"

      - name: Delete deployment
        run: |
          kubectl delete namespace "$PROJECT_NAME" --ignore-not-found
          echo "Namespace and all resources removed."

      - name: Clear VRAM
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          gh api --method PATCH \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables/DGX_TRTLLM_VRAM_GB" \
            -f value="0" 2>/dev/null || true

      - name: Clear serving state
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          gh api --method PATCH \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables/DGX_SERVING_ACTIVE" \
            -f value="false" 2>/dev/null || true

      - name: Deregister from Open WebUI
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
          DEREGISTER_SCRIPT: |
            import yaml
            with open('/tmp/router-config.yaml') as f:
                config = yaml.safe_load(f) or {}
            model_list = config.get('model_list') or []
            with open('serving-config.yaml') as f:
                serving = yaml.safe_load(f)
            name = serving['model']['served_model_name']
            config['model_list'] = [m for m in model_list if m.get('model_name') != name]
            with open('/tmp/router-config-new.yaml', 'w') as f:
                yaml.dump(config, f, default_flow_style=False)
        run: |
          CONFIG_PATH="dgx/k3s/model-router/litellm-config.yaml"
          SERVED_MODEL_NAME=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['model']['served_model_name'])" 2>/dev/null || true)
          [[ -z "$SERVED_MODEL_NAME" ]] && echo "Cannot read served_model_name — skipping" && exit 0
          if kubectl get namespace model-router --ignore-not-found 2>/dev/null | grep -q model-router; then
            FILE_JSON=$(gh api "repos/miramar-labs-org/miramar-platform-gcp/contents/${CONFIG_PATH}" 2>/dev/null || true)
            if [[ -n "$FILE_JSON" ]]; then
              FILE_SHA=$(echo "$FILE_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])")
              echo "$FILE_JSON" | python3 -c "import json,sys,base64; print(base64.b64decode(json.load(sys.stdin)['content']).decode())" > /tmp/router-config.yaml
              printf '%s' "$DEREGISTER_SCRIPT" | python3
              NEW_B64=$(base64 -w 0 /tmp/router-config-new.yaml)
              gh api --method PUT \
                "repos/miramar-labs-org/miramar-platform-gcp/contents/${CONFIG_PATH}" \
                -f message="chore(model-router): remove ${SERVED_MODEL_NAME} [${PROJECT_NAME}]" \
                -f content="${NEW_B64}" -f sha="${FILE_SHA}" > /dev/null
              echo "Deregistered ${SERVED_MODEL_NAME} — triggering router redeploy"
              gh workflow run deploy-model-router.yaml \
                --repo miramar-labs-org/miramar-platform-gcp \
                --field runner=dgx
            fi
          else
            gh api --method DELETE "/orgs/miramar-labs-org/actions/variables/DGX_OPENWEBUI_API_URL" \
              2>/dev/null || true
            OWUI_ACTIVE=$(gh api "orgs/miramar-labs-org/actions/variables/DGX_OPENWEBUI_ACTIVE" \
              --jq '.value // empty' 2>/dev/null || true)
            if [[ "$OWUI_ACTIVE" == "true" ]]; then
              gh workflow run deploy-openwebui.yaml \
                --repo miramar-labs-org/miramar-platform-gcp \
                --field host=dgx
            fi
          fi

      - name: Summary
        run: |
          {
            echo "## Undeploy: $PROJECT_NAME (DGX K3s)"
            echo "TRT-LLM deployment removed. GPU memory freed."
          } >> "$GITHUB_STEP_SUMMARY"

  undeploy-agx:
    if: inputs.host == 'agx'
    runs-on: [self-hosted, agx]
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: echo "KUBECONFIG=${HOME}/.kube/config" >> "${GITHUB_ENV}"

      - name: Delete deployment
        run: |
          kubectl delete namespace "$PROJECT_NAME" --ignore-not-found
          echo "Namespace and all resources removed."

      - name: Clear VRAM
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          gh api --method PATCH \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables/AGX_TRTLLM_VRAM_GB" \
            -f value="0" 2>/dev/null || true

      - name: Clear serving state
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          gh api --method PATCH \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables/AGX_SERVING_ACTIVE" \
            -f value="false" 2>/dev/null || true

      - name: Deregister from Open WebUI
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
          DEREGISTER_SCRIPT: |
            import yaml
            with open('/tmp/router-config.yaml') as f:
                config = yaml.safe_load(f) or {}
            model_list = config.get('model_list') or []
            with open('serving-config.yaml') as f:
                serving = yaml.safe_load(f)
            name = serving['model']['served_model_name']
            config['model_list'] = [m for m in model_list if m.get('model_name') != name]
            with open('/tmp/router-config-new.yaml', 'w') as f:
                yaml.dump(config, f, default_flow_style=False)
        run: |
          CONFIG_PATH="agx/k3s/model-router/litellm-config.yaml"
          SERVED_MODEL_NAME=$(python3 -c "import yaml; c=yaml.safe_load(open('serving-config.yaml')); print(c['model']['served_model_name'])" 2>/dev/null || true)
          [[ -z "$SERVED_MODEL_NAME" ]] && echo "Cannot read served_model_name — skipping" && exit 0
          if kubectl get namespace model-router --ignore-not-found 2>/dev/null | grep -q model-router; then
            FILE_JSON=$(gh api "repos/miramar-labs-org/miramar-platform-gcp/contents/${CONFIG_PATH}" 2>/dev/null || true)
            if [[ -n "$FILE_JSON" ]]; then
              FILE_SHA=$(echo "$FILE_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])")
              echo "$FILE_JSON" | python3 -c "import json,sys,base64; print(base64.b64decode(json.load(sys.stdin)['content']).decode())" > /tmp/router-config.yaml
              printf '%s' "$DEREGISTER_SCRIPT" | python3
              NEW_B64=$(base64 -w 0 /tmp/router-config-new.yaml)
              gh api --method PUT \
                "repos/miramar-labs-org/miramar-platform-gcp/contents/${CONFIG_PATH}" \
                -f message="chore(model-router): remove ${SERVED_MODEL_NAME} [${PROJECT_NAME}]" \
                -f content="${NEW_B64}" -f sha="${FILE_SHA}" > /dev/null
              echo "Deregistered ${SERVED_MODEL_NAME} — triggering router redeploy"
              gh workflow run deploy-model-router.yaml \
                --repo miramar-labs-org/miramar-platform-gcp \
                --field runner=agx
            fi
          else
            gh api --method DELETE "/orgs/miramar-labs-org/actions/variables/AGX_OPENWEBUI_API_URL" \
              2>/dev/null || true
            OWUI_ACTIVE=$(gh api "orgs/miramar-labs-org/actions/variables/AGX_OPENWEBUI_ACTIVE" \
              --jq '.value // empty' 2>/dev/null || true)
            if [[ "$OWUI_ACTIVE" == "true" ]]; then
              gh workflow run deploy-openwebui.yaml \
                --repo miramar-labs-org/miramar-platform-gcp \
                --field host=agx
            fi
          fi

      - name: Summary
        run: |
          {
            echo "## Undeploy: $PROJECT_NAME (AGX K3s)"
            echo "TRT-LLM deployment removed. GPU memory freed."
          } >> "$GITHUB_STEP_SUMMARY"

  undeploy-gke:
    if: inputs.host == 'gke'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Delete deployment
        run: |
          kubectl delete namespace "$PROJECT_NAME" --ignore-not-found
          echo "Namespace and all resources removed."

      - name: Restore GPU node pool
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          echo "Triggering gke-restore-gpu (namespace=$PROJECT_NAME)"
          gh workflow run gke-restore-gpu.yaml \
            --repo miramar-labs-org/miramar-platform-gcp \
            --field namespace="$PROJECT_NAME"
          echo "GPU restore triggered. Pool will be torn down shortly."

      - name: Clear serving state
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          gh api --method PATCH \
            "repos/miramar-labs-org/${{ env.PROJECT_NAME }}/actions/variables/GKE_SERVING_ACTIVE" \
            -f value="false" 2>/dev/null || true

      - name: Reset Open WebUI backend to Ollama
        env:
          GH_TOKEN: ${{ secrets.MIRAMAR_ORG_ADMIN_PAT }}
        run: |
          gh api --method DELETE "/orgs/miramar-labs-org/actions/variables/GKE_OPENWEBUI_API_URL" \
            2>/dev/null || true
          OWUI_ACTIVE=$(gh api "orgs/miramar-labs-org/actions/variables/GKE_OPENWEBUI_ACTIVE" \
            --jq '.value // empty' 2>/dev/null || true)
          if [[ "$OWUI_ACTIVE" == "true" ]]; then
            gh workflow run deploy-openwebui.yaml \
              --repo miramar-labs-org/miramar-platform-gcp \
              --field host=gke
          fi

      - name: Summary
        run: |
          {
            echo "## Undeploy: $PROJECT_NAME (GKE)"
            echo "TRT-LLM deployment removed. GPU node pool restore triggered."
            echo "GPU costs stopped."
          } >> "$GITHUB_STEP_SUMMARY"
