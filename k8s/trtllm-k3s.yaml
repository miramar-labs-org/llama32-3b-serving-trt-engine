apiVersion: apps/v1
kind: Deployment
metadata:
  name: trtllm
  namespace: llama32-3b-serving-trt-engine
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: trtllm
  template:
    metadata:
      labels:
        app: trtllm
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: nvcr-pull
      containers:
        - name: trtllm-serve
          image: nvcr.io/nvidia/tensorrt-llm/release:1.2.1
          command: ["trtllm-serve"]
          args:
            - /engine
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --backend
            - tensorrt
            - --max_batch_size
            - "MAX_BATCH_SIZE_PLACEHOLDER"
            - --tokenizer
            - /model
          env:
            - name: LD_LIBRARY_PATH
              value: "/opt/nvidia/nvda_nixl/lib/aarch64-linux-gnu:/opt/nvidia/nvda_nixl/lib64:/usr/local/ucx/lib:/usr/local/tensorrt/lib:/usr/local/cuda/lib64:/usr/local/lib/python3.12/dist-packages/torch/lib:/usr/local/lib/python3.12/dist-packages/torch_tensorrt/lib:/usr/local/cuda/compat/lib:/usr/local/nvidia/lib:/usr/local/nvidia/lib64"
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 4
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: engine
              mountPath: /engine
              readOnly: true
            - name: model
              mountPath: /model
              readOnly: true
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: engine
          hostPath:
            path: ENGINE_PATH_PLACEHOLDER
            type: Directory
        - name: model
          hostPath:
            path: MODEL_PATH_PLACEHOLDER
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: trtllm
  namespace: llama32-3b-serving-trt-engine
spec:
  type: ClusterIP
  selector:
    app: trtllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
