apiVersion: v1
kind: Namespace
metadata:
  name: llama32-3b-serving-trt-engine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trtllm
  namespace: llama32-3b-serving-trt-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trtllm
  template:
    metadata:
      labels:
        app: trtllm
    spec:
      enableServiceLinks: false
      containers:
        - name: trtllm-serve
          image: IMAGE_PLACEHOLDER
          command: ["python3", "-m", "tensorrt_llm.serve"]
          args:
            - --model_dir=/engine
            - --host=0.0.0.0
            - --port=8000
            - --served_model_name=SERVED_MODEL_NAME_PLACEHOLDER
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 4
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /v1/health/live
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: engine
              mountPath: /engine
              readOnly: true
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: engine
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: trtllm
  namespace: llama32-3b-serving-trt-engine
spec:
  type: ClusterIP
  selector:
    app: trtllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
